{% extends "base.html" %}

{% block title %}LOGIN — Сайт Макса{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-md">
        <!-- Карточка входа -->
        <div class="glass-card p-8 animate-fade-in relative">
            <!-- Декоративные элементы -->
            <div class="absolute top-0 left-0 w-16 h-16 border-l-2 border-t-2 border-orange-500/30"></div>
            <div class="absolute top-0 right-0 w-16 h-16 border-r-2 border-t-2 border-orange-500/30"></div>
            <div class="absolute bottom-0 left-0 w-16 h-16 border-l-2 border-b-2 border-orange-500/30"></div>
            <div class="absolute bottom-0 right-0 w-16 h-16 border-r-2 border-b-2 border-orange-500/30"></div>
            
            <!-- Иконка замка -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 border-2 border-orange-500/30 bg-black/30 mb-4">
                    <svg class="w-10 h-10 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-orange-500 mb-2 font-mono">
                    [ADMIN_AUTHENTICATION]
                </h1>
                <p class="text-gray-600 text-xs font-mono">
                    ENTER CREDENTIALS TO ACCESS SYSTEM
                </p>
            </div>
            
            <!-- Форма -->
            <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
                <div>
                    <label for="password" class="block text-xs font-mono text-gray-500 mb-2">
                        >> ENTER_PASSWORD
                    </label>
                    <div class="relative">
                        <input type="password" 
                            id="password" 
                            name="password" 
                            required
                            autofocus
                            class="w-full px-4 py-4 pl-4 font-mono text-lg tracking-widest input-glass text-center"
                            placeholder="••••••••">
                    </div>
                </div>
                
                <button type="submit" 
                    class="btn-neon w-full px-6 py-4 font-mono text-sm font-bold tracking-wider">
                    [AUTHENTICATE]
                </button>
            </form>
            
            <!-- Ссылка назад -->
            <div class="mt-8 pt-6 border-t border-gray-800 text-center">
                <a href="{{ url_for('index') }}" class="inline-flex items-center gap-2 text-xs text-gray-600 hover:text-orange-500 transition-colors font-mono">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    [RETURN_TO_FEED]
                </a>
            </div>
        </div>
        
        <!-- Статус бар -->
        <div class="mt-6 p-4 bg-black/30 border border-gray-800 font-mono text-xs text-center">
            <div class="flex items-center justify-center gap-4 text-gray-600">
                <span class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 status-indicator"></span>
                    SECURE_CONNECTION
                </span>
                <span>|</span>
                <span>ENCRYPTION: ACTIVE</span>
            </div>
            <div class="mt-2 text-gray-700">
                ⚠️ UNAUTHORIZED_ACCESS_IS_PROHIBITED
            </div>
        </div>
    </div>
</div>
{% endblock %}
