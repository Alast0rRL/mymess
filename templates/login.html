{% extends "base.html" %}

{% block title %}Вход — Сайт Макса{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-md">
        <!-- Карточка входа -->
        <div class="glass-card rounded-3xl p-8 animate-fade-in">
            <!-- Иконка замка -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-br from-purple-500/20 to-pink-500/20 border border-purple-500/30 mb-4">
                    <svg class="w-10 h-10 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold gradient-text mb-2">
                    Вход для администратора
                </h1>
                <p class="text-gray-400 text-sm">
                    Введите пароль для доступа к управлению
                </p>
            </div>
            
            <!-- Форма -->
            <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-400 mb-2">
                        Пароль
                    </label>
                    <div class="relative">
                        <input type="password" 
                            id="password" 
                            name="password" 
                            required
                            autofocus
                            class="w-full px-5 py-4 pl-12 rounded-xl input-glass text-lg tracking-wider"
                            placeholder="••••••••">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                    </div>
                </div>
                
                <button type="submit" 
                    class="btn-glow w-full px-6 py-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold rounded-xl hover:from-purple-600 hover:to-pink-600 transition-all shadow-lg shadow-purple-500/25 text-lg">
                    🔐 Войти
                </button>
            </form>
            
            <!-- Ссылка назад -->
            <div class="mt-8 pt-6 border-t border-white/10 text-center">
                <a href="{{ url_for('index') }}" class="inline-flex items-center gap-2 text-sm text-gray-400 hover:text-white transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Вернуться к ленте
                </a>
            </div>
        </div>
        
        <!-- Декоративный элемент -->
        <div class="text-center mt-8">
            <p class="text-xs text-gray-600">
                ✦ Сайт Макса — приватный доступ
            </p>
        </div>
    </div>
</div>
{% endblock %}
