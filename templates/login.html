{% extends "base.html" %}

{% block title %}Вход — Сайт Макса{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-md">
        <!-- Карточка входа -->
        <div class="glass-card p-8 animate-fade-in">
            <!-- Иконка -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-full mb-4">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 mb-2">
                    Вход для администратора
                </h1>
                <p class="text-gray-500 text-sm">
                    Введите пароль для доступа к управлению
                </p>
            </div>
            
            <!-- Форма -->
            <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        Пароль
                    </label>
                    <input type="password" 
                        id="password" 
                        name="password" 
                        required
                        autofocus
                        class="w-full input-clean text-lg tracking-wider"
                        placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-primary w-full py-3 text-lg">
                    Войти
                </button>
            </form>
            
            <!-- Ссылка назад -->
            <div class="mt-8 pt-6 border-t border-gray-200 text-center">
                <a href="{{ url_for('index') }}" class="text-sm text-gray-600 hover:text-blue-500 inline-flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Вернуться к ленте
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
