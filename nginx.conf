events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Логирование
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json image/svg+xml;

    # Upstream для Flask приложения
    upstream freedom_stream {
        server web:8010;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Максимальный размер загрузки
        client_max_body_size 100M;

        # Статика (uploads)
        location /static/uploads/ {
            alias /app/static/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Прокси на Flask приложение
        location / {
            proxy_pass http://freedom_stream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Таймауты
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Для WebSocket (если понадобится)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Health check endpoint
        location /health {
            proxy_pass http://freedom_stream/health;
            access_log off;
        }
    }
}
